    type: feature
    description: >-
      Same UI works in Electron (IPC) and browser/mobile (HTTP+WebSocket).
      Factory pattern returns ElectronBackend or HttpBackend implementing the
      same Api interface.
    status:
      maturity: draft
      implementation: not_started
    depends_on: []
    implements: []
    relates_to: []
    tests: []
    traits: []
    acceptance_criteria:
      - given: the app is running in a browser (no window.electronAPI)
        id: ac-1
        then: >-
          HttpBackend is created using WebSocket for PTY data and HTTP for all
