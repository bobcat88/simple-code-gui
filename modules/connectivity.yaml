features:
  - _ulid: 01KK67DB6KDCNTJXZ88124DXNB
    slugs:
      - prompt-api
    title: HTTP Prompt API
    type: feature
    description: >-
      Per-project HTTP server for external prompt injection. Session modes:
      existing (reuse terminal), new-keep (spawn and keep), new-close (spawn and
      auto-close). Rate limited to 10 req/60s per IP.
    status:
      maturity: draft
      implementation: implemented
    depends_on: []
    implements: []
    relates_to: []
    tests: []
    traits: []
    acceptance_criteria:
      - given: the prompt API is active
        id: ac-prompt-1
        then: >-
          the prompt is injected into the target terminal session according to
          the specified mode
        when: an external request is made to the project-specific endpoint
    tags: []
    created: 2026-03-08T08:00:55.507Z
    notes: []
  - _ulid: 01KK67DDQ2F5G1QH5Q04JRF943
    slugs:
      - orchestrator
    title: MCP Orchestrator
    type: feature
    description: >-
      Localhost HTTP API (port 19836) enabling MCP-based cross-session control.
      List sessions, read output (last N lines), send input to any PTY.
      Companion MCP server script for Claude CLI integration.
    status:
      maturity: draft
      implementation: not_started
    depends_on: []
    implements: []
    relates_to: []
    tests: []
    traits: []
    acceptance_criteria:
      - given: multiple PTY sessions are running
        id: ac-1
        then: >-
          a JSON array of all sessions is returned with id, cwd, backend,
          projectPath, projectName, and spawnedAt
        when: GET /sessions is called on localhost:19836
      - given: a PTY session exists
        id: ac-2
        then: >-
          the text followed by carriage return is written to the PTY, simulating
          user keyboard input
        when: POST /sessions/{id}/input is called with text
    tags: []
    created: 2026-03-08T08:00:58.082Z
    notes: []
  - _ulid: 01KK67DFJH7RN2ATAG7E69AZVN
    slugs:
      - mobile-server
    title: Mobile Server
    type: feature
    description: >-
      WebSocket + HTTP server for mobile app connectivity. Token-based auth, IP
      whitelisting, device fingerprinting, rate limiting, nonce-based CSRF
      protection. Streams terminal data, supports file transfer.
    status:
      maturity: draft
      implementation: not_started
    depends_on: []
    implements: []
    relates_to: []
    tests: []
    traits: []
    acceptance_criteria:
      - given: the mobile server is running
        id: ac-1
        then: the connection is rejected with 401 unauthorized
        when: a connection attempt is made without a valid token
    tags: []
    created: 2026-03-08T08:00:59.986Z
    notes: []
  - _ulid: 01KK67DHDD4MZ13MB7CKSBGPMP
    slugs:
      - dual-env
