  - _ulid: 01KK67DDQ2F5G1QH5Q04JRF943
    slugs:
      - orchestrator
    title: MCP Orchestrator
    type: feature
    tags: []
    description: Localhost HTTP API (port 19836) enabling MCP-based cross-session control. List
      sessions, read output (last N lines), send input to any PTY. Companion MCP server script for
      Claude CLI integration.
    depends_on: []
    implements: []
    relates_to: []
    tests: []
    traits: []
    notes: []
    created: 2026-03-08T08:00:58.082Z
    acceptance_criteria:
      - id: ac-1
        given: multiple PTY sessions are running
        when: GET /sessions is called on localhost:19836
        then: a JSON array of all sessions is returned with id, cwd, backend, projectPath, projectName, and
          spawnedAt
      - id: ac-2
        given: a PTY session exists
        when: POST /sessions/{id}/input is called with text
        then: the text followed by carriage return is written to the PTY, simulating user keyboard input
    status:
      maturity: draft
      implementation: in_progress
