  - _ulid: 01KPSWSEAWPZPFASZ4JGRPCCZA
    content: "Implemented a live session token HUD inside the terminal viewport. useTokenMeter now
      tracks cumulative session burn state (input/output/saved/cost/event count), resets cleanly on
      PTY changes, and still logs token events when the backend API is present. Added TokenBudgetHud
      with session burn, estimated cost, and budget-guardrail status plus a progress bar; wired it
      into Terminal as an overlay for the active session. Verification: vitest run on
      TokenBudgetHud.test.tsx and useTokenMeter.test.tsx passed. bun run build failed in
      src/health_manager.rs with a pre-existing Rust compile error unrelated to this HUD change."
    supersedes: null
    author: Johan.P
    created_at: 2026-04-22T06:07:11.709Z
