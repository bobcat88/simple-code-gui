    content: >-
      Implementation notes (auto-generated from spec):


      WebRTC audio capture with Whisper.js models (tiny to large-v3). Silence detection for
      auto-submit, live transcription display, configurable microphone and silence threshold.



      Acceptance Criteria:

      - ac-1: Given whisper model is loaded and microphone is active, when the user speaks and then
      pauses beyond the silence threshold, then the audio is transcribed and the text is
      auto-submitted to the active terminal
