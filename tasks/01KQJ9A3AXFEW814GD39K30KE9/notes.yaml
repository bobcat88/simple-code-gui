    content: >-
      Implementation notes (auto-generated from spec):


      Per-project HTTP server for external prompt injection. Session modes: existing (reuse
      terminal), new-keep (spawn and keep), new-close (spawn and auto-close). Rate limited to 10
      req/60s per IP.



      Acceptance Criteria:

      - ac-prompt-1: Given the prompt API is active, when an external request is made to the
      project-specific endpoint, then the prompt is injected into the target terminal session
      according to the specified mode
