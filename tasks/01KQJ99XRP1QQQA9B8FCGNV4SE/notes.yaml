    content: >-
      Implementation notes (auto-generated from spec):


      Flexible grid layout where terminals are positioned as tiles using percentage-based
      coordinates. Supports splitting, swapping, and multi-tab tiles on a pannable canvas.



      Acceptance Criteria:

      - ac-1: Given user is in tiled view mode, when a new session is opened, then a new tile is
      added to the layout with percentage-based coordinates and the terminal renders inside it

      - ac-2: Given multiple tiles exist on the canvas, when a tile is split, then the tile divides
      into two tiles in the specified direction (top/bottom/left/right) each getting half the space
