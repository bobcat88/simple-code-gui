    notes:
      - _ulid: 01KKAYXDC37GJG0ZKMSYGMQK1H
        created_at: 2026-03-10T04:08:36.995Z
        author: "@claude"
        content: >-
          Execution context:

          - Background: PTY lifecycle has several bugs in backend switching and output buffer
          handling

          - Scope: Fix backend switch (error handling, settings inheritance, autoClose transfer),
          fix ANSI regex

          - Files: src/main/app/ipc-handlers/pty.ts, src/main/pty-manager.ts

          - Verification: TypeScript compiles clean, npm run build succeeds


          Bugs fixed:

          1. pty:set-backend lost project settings (autoAcceptTools, permissionMode) — now looks up
          workspace/project settings

          2. pty:set-backend had no error handling — spawn failure after kill left user with no PTY;
          now throws to renderer

          3. pty:set-backend didn't transfer autoCloseSessions — flag leaked for old ID; now
          transferred

          4. pty:set-backend onData/onExit lacked try-catch on IPC send — inconsistent with
          pty:spawn handler

          5. OutputBuffer ANSI regex missed private mode sequences (\x1b[?25h etc.), character set
          escapes (\x1b(B), and OSC with ST terminator — all now stripped
        supersedes: null
