          Execution context:

          - Background: Bug audit of tiled layout and drag-drop system

          - Scope: Fix bugs in splitTile, drag-split gaps, validateLayout thresholds and overlap
          handling

          - Files: src/renderer/components/tiled-layout-utils.ts,
          src/renderer/components/tiled/useTileDragDrop.ts

          - Bugs found:
