    notes:
      - _ulid: 01KKB391FJ67DSH2HVC2TK06SN
        created_at: 2026-03-10T05:24:52.338Z
        author: "@claude"
        content: >-
          4 bugs fixed:

          1. useDragAndDrop.ts: stale dropTarget position — handleProjectDrop and
          handleCategoryHeaderDrop read dropTarget?.position from React state closure which could be
          stale when drop fires (React may not have re-rendered since last dragOver). Added
          dropTargetRef that's updated synchronously alongside state, so drop handlers always read
          the latest position.

          2. useSidebarHandlers.ts: rename Escape saves via blur — pressing Escape during inline
          rename calls setEditingProject(null), React unmounts the input, browser fires blur with
          the OLD handler that still has editingProject in closure, causing an unwanted save. Added
          renameCancelledRef that gets set on Escape and checked in the blur handler.

          3. useSidebarHandlers.ts: same Escape→blur bug for category rename — identical pattern,
          added categoryRenameCancelledRef.

          4. useProjectHandlers.ts: handleCloseProjectTabs missing undo history — unlike
          handleCloseTab (single tab), closing all project tabs didn't save to closedTabsRef, making
          undo impossible. Added push to closedTabsRef for each closed tab.
        supersedes: null
    todos: []
    automation: eligible
