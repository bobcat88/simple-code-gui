    description: Autonomous task worker. Picks up automation-eligible ready and needs_work tasks.
    adapter: claude-code
    auto_approve: true
    capabilities:
      - code
      - test
      - refactor
    concurrency:
      max_concurrent: 3
    conventions: []
    dispatch:
      - filter:
          automation: eligible
        on: task.in_progress
      - filter:
          automation: eligible
        on: task.ready
      - filter:
          automation: eligible
        on: task.needs_work
    id: task-worker
