agents:
  - _ulid: 01KK672F8BMSW2KDX95DC1PRPR
    description: Autonomous task worker. Picks up automation-eligible ready and needs_work tasks.
    adapter: claude-agent-acp
    auto_approve: true
    capabilities:
      - code
      - test
      - refactor
    concurrency:
      max_concurrent: 3
    conventions: []
    dispatch:
      - filter:
          automation: eligible
        on: task.in_progress
      - filter:
          automation: eligible
        on: task.ready
      - filter:
          automation: eligible
        on: task.needs_work
    id: task-worker
    name: Task Worker
    skills:
      - task-work
    tools:
      - kspec
      - git
      - npm
  - _ulid: 01KK672F8EP6W56DA342BDJQRR
    description: Automated PR reviewer. Reviews pending_review tasks and merges when quality gates pass.
    adapter: droid-acp
    auto_approve: false
    capabilities:
      - review
    concurrency:
      max_concurrent: 3
    conventions: []
    dispatch:
      - on: task.pending_review
    id: pr-reviewer
    name: PR Reviewer
    skills:
      - pr-review
    tools:
      - kspec
      - git
      - gh
  - _ulid: 01KPPC8YXW85565C280AE0254Q
    description: General-purpose development agent for code, testing, refactoring, and code review tasks.
    tags:
      - scaffold-default
    auto_approve: true
    capabilities:
      - code
      - test
      - refactor
      - review
    concurrency:
      max_concurrent: 1
    conventions: []
    dispatch: []
    id: primary-dev
    name: Primary Development Agent
    skills:
      - task-work
    tools:
      - kspec
      - git
      - npm
  - _ulid: 01KPPC8YY1H3GXJ6Q3DFEKFR3N
    description: |-
      Reviews plans for quality, completeness, and spec alignment.
      Has review capability and plan-focused skills attached.

      Adapter guidance: This agent uses the default adapter configured
      for your project. If authentication fails with the default adapter,
      you can switch adapters using:
        kspec meta set agents --update plan-reviewer --adapter <adapter-name>
      Run `kspec agent adapters` to list available adapters and their
      authentication requirements.
    tags:
      - scaffold-default
    auto_approve: true
    capabilities:
      - review
    concurrency:
      max_concurrent: 1
    conventions: []
    dispatch: []
    id: plan-reviewer
    name: Plan Reviewer
    skills:
      - review-plan
      - writing-specs
      - plan
    tools:
      - kspec
      - git
conventions:
  - _ulid: 01KPPC8YY6MTZKRVSA6R6WSBZ1
    domain: commits
    examples: []
    rules:
      - Use conventional commit format (feat, fix, docs, refactor, test, chore)
      - "Reference task in commit body when applicable (Task: @task-slug)"
  - _ulid: 01KPPC8YYDY21756NX3T6R95DJ
    domain: architecture
    examples: []
    rules:
      - "PLACEHOLDER: Replace this rule with your project's architectural constraints and patterns"
  - _ulid: 01KPPC8YYMCSQZXAZGT7BEXBME
    domain: testing
    examples: []
    rules:
      - "PLACEHOLDER: Replace this rule with your project's testing expectations and coverage
        requirements"
hooks:
  - _ulid: 01KPPC8YZA212VV7BA3697Y5ZJ
    action:
      type: session_prompt
      prompt: Run session reflection using /kspec:reflect
      skills:
        - reflect
    enabled: true
    filter:
      turn_count: 1
    name: default-session-reflect
    on: session.idle
